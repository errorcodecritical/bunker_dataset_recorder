services:
  xsens:
    build:
     context: .
     dockerfile: xsens/Dockerfile
    container_name: xsens
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../config/xsens/mtdevice.py:/ros2_ws/src/norlab_xsens_driver/xsens_driver/mtdevice.py:rw
      - ../config/xsens/mtnode.py:/ros2_ws/src/norlab_xsens_driver/xsens_driver/mtnode.py:rw
      - ../config/xsens/xsens_driver.launch.xml:/ros2_ws/src/norlab_xsens_driver/launch/xsens_driver.launch.xml:rw
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/xsens-launch.sh

  emlid:
    build:
      context: .
      dockerfile: emlid/Dockerfile
    container_name: emlid
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../config/emlid/nmea_serial_driver.py:/ros2_ws/src/nmea_navsat_driver/src/libnmea_navsat_driver/nodes/nmea_serial_driver.py:rw
      - ../config/emlid/nmea_serial_driver.yaml:/ros2_ws/src/nmea_navsat_driver/config/nmea_serial_driver.yaml:rw
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/emlid-launch.sh

  oakd:
    build:
      context: .
      dockerfile: oakd/Dockerfile
    container_name: oakd
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      #Depthai ROS config
      - ../config/oakd/depthai_ros_driver/config:/opt/ros/jazzy/share/depthai_ros_driver/config
      - ../config/oakd/depthai_ros_driver/launch:/opt/ros/jazzy/share/depthai_ros_driver/launch
      #Depthai ROS V3 config
      #- ../config/oakd/depthai_ros_driver/config/:/opt/ros/jazzy/share/depthai_ros_driver_v3/config/
      #- ../config/oakd/depthai_ros_driver/launch/:/opt/ros/jazzy/share/depthai_ros_driver_v3/launch/
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/oakd-launch.sh

  hesai:
    build:
     context: .
     dockerfile: hesai/Dockerfile
    container_name: hesai
    privileged: true
    network_mode: host
    # ports:
    #   - "2368:2368/udp"
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/hesai-launch.sh

  atlas:
    build:
     context: .
     dockerfile: atlas/Dockerfile
    container_name: atlas
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../ros2_ws/src/atlas:/shared/atlas # !
      - ../ros2_ws/src/atlas/ros2_examples/src/ros2_aeva_publisher:/ros2_ws/src/ros2_aeva_publisher
      - ../ros2_ws/src/atlas/ros2_examples/src/aeva_msgs:/ros2_ws/src/aeva_msgs
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/atlas-launch.sh

  hugin:
    build:
     context: ..
     dockerfile: docker/hugin/Dockerfile
    container_name: hugin
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    network_mode: host
    # ports:
    #   - "6001:6001/udp"
    #   - "6003:6003/udp"
    #   - "6007:6007/udp"
    #   - "6010:6010/udp"
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../ros2_ws/src/hugin/ros2/src/:/opt/ros/overlay_ws/src/ # !
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=$DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/hugin-launch.sh

  bunker:
    build:
      context: .
      dockerfile: bunker/Dockerfile
    container_name: bunker
    privileged: true
    network_mode: host
    volumes:
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../config/bunker:/config/bunker
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      #- CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/bunker-launch.sh

  recorder:
    build:
      context: .
      dockerfile: recorder/Dockerfile
    container_name: recorder
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../../rosbags/:/rosbags/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../ros2_ws/src/atlas:/shared/atlas # !
      - ../ros2_ws/src/atlas/ros2_examples/src/ros2_aeva_publisher:/ros2_ws/src/ros2_aeva_publisher
      - ../ros2_ws/src/atlas/ros2_examples/src/aeva_msgs:/ros2_ws/src/aeva_msgs
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/recorder-launch.sh

  visualizer:
    build:
      context: .
      dockerfile: visualizer/Dockerfile
    container_name: visualizer
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    # ports:
    #   - "9092:9092"
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../../rosbags/:/rosbags/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../ros2_ws/src/atlas:/shared/atlas # !
      - ../ros2_ws/src/atlas/ros2_examples/src/ros2_aeva_publisher:/ros2_ws/src/ros2_aeva_publisher
      - ../ros2_ws/src/atlas/ros2_examples/src/aeva_msgs:/ros2_ws/src/aeva_msgs
      - ../ros2_ws/src/bunker_description:/ros2_ws/src/bunker_description
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=$DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/visualizer-launch.sh
