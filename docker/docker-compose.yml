version: '3.8'

services:
  hesai_driver:
    image: hesai_lidar_noetic:latest
    container_name: hesai_lidar_driver
    build:
      context: ./hesai
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.Xauthority
    volumes:
      - ../catkin_ws:/catkin_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/tmp/.Xauthority:rw
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Hesai ROS Workspace ==="
        catkin build hesai_ros_driver -j 6 -p 6
        source /catkin_ws/devel/setup.bash
        roslaunch hesai_ros_driver start.launch config_path:=/config/hesai/config.yaml

  oakd_driver:
    image: oakd_noetic:latest
    container_name: oakd_driver
    build:
      context: ./oakd
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
      #Depthai ROS config
      - ../config/oakd/depthai_ros_driver/config:/opt/ros/noetic/share/depthai_ros_driver/config
      - ../config/oakd/depthai_ros_driver/launch:/opt/ros/noetic/share/depthai_ros_driver/launch
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building OakD ROS Workspace ==="
        catkin build depthai_ros_driver -j 6 -p 6
        source /catkin_ws/devel/setup.bash
        roslaunch depthai_ros_driver camera.launch

  xsens_mti_driver:
    image: xsens_mti_noetic:latest
    container_name: xsens_mti_driver
    build:
      context: ./xsens
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Xsens MTI ROS Workspace ==="
        source /catkin_ws/devel/setup.bash
        roslaunch xsens_mti_driver xsens_mti_node.launch

  nmea_navsat_driver:
    image: nmea_navsat_noetic:latest
    container_name: nmea_navsat_driver
    build:
      context: ./emlid
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building NMEA NavSat ROS Workspace ==="
        source /catkin_ws/devel/setup.bash
        roslaunch nmea_navsat_driver nmea_serial_driver.launch

  recorder:
    image: ros_noetic_recorder:latest
    container_name: recorder
    build:
      context: ./recorder
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Recorder ROS Workspace ==="
        source /catkin_ws/devel/setup.bash
        roslaunch recorder recorder.launch

  bunker_driver:
    image: bunker_driver_noetic:latest
    container_name: bunker_driver
    build:
      context: ./bunker
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Bunker ROS Workspace ==="
        source /catkin_ws/devel/setup.bash
        catkin build bunker_base bunker_msgs bunker_bringup ugv_sdk -j 6 -p 6 --cmake-args -DCMAKE_CXX_FLAGS="-DASIO_ENABLE_OLD_SERVICES" 
        roslaunch bunker_bringup bunker_robot_base.launch port_name:=can0

  teleop:
    build:
      context: ./bunker
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Teleop ROS Workspace ==="
        source /catkin_ws/devel/setup.bash
        roslaunch bunker_bringup bunker_teleop_keyboard.launch
    depends_on:
      - bunker_driver