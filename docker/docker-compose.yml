services:
  xsens:
    build:
     context: .
     dockerfile: xsens/Dockerfile
    container_name: xsens
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws/build/xsens-build:/ros2_ws/build
      - ../shared/:/shared/
      - ../config/xsens/mtdevice.py:/ros2_ws/src/norlab_xsens_driver/xsens_driver/mtdevice.py:rw
      - ../config/xsens/mtnode.py:/ros2_ws/src/norlab_xsens_driver/xsens_driver/mtnode.py:rw
      - ../config/xsens/xsens_driver.launch.xml:/ros2_ws/src/norlab_xsens_driver/launch/xsens_driver.launch.xml:rw
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/xsens-launch.sh

  emlid:
    build:
      context: .
      dockerfile: emlid/Dockerfile
    container_name: emlid
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws/build/emlid-build:/ros2_ws/build
      - ../shared/:/shared/
      - ../config/emlid/nmea_serial_driver.py:/ros2_ws/src/nmea_navsat_driver/src/libnmea_navsat_driver/nodes/nmea_serial_driver.py:rw
      - ../config/emlid/nmea_serial_driver.yaml:/ros2_ws/src/nmea_navsat_driver/config/nmea_serial_driver.yaml:rw
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/emlid-launch.sh

  oakd:
    build:
      context: .
      dockerfile: oakd/Dockerfile
    container_name: oakd
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws/build/oakd-build:/ros2_ws/build
      - ../shared/:/shared/
      #Depthai ROS config
      - ../config/oakd/depthai_ros_driver/config:/opt/ros/jazzy/share/depthai_ros_driver/config
      - ../config/oakd/depthai_ros_driver/launch:/opt/ros/jazzy/share/depthai_ros_driver/launch
      #Depthai ROS V3 config
      #- ../config/oakd/depthai_ros_driver/config/:/opt/ros/jazzy/share/depthai_ros_driver_v3/config/
      #- ../config/oakd/depthai_ros_driver/launch/:/opt/ros/jazzy/share/depthai_ros_driver_v3/launch/
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/oakd-launch.sh

  hesai:
    build:
     context: .
     dockerfile: hesai/Dockerfile
    container_name: hesai
    privileged: true
    network_mode: host
    # ports:
    #   - "2368:2368/udp"
    volumes:
      - /dev/:/dev/
      - ../ros2_ws/build/hesai-build:/ros2_ws/build
      - ../ros2_ws/src/HesaiLidar_ROS_2.0/:/ros2_ws/src/HesaiLidar_ROS_2.0/
      - ../shared/:/shared/
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/hesai-launch.sh

  atlas:
    build:
     context: .
     dockerfile: atlas/Dockerfile
    container_name: atlas
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws/build/atlas-build:/ros2_ws/build
      - ../shared/:/shared/
      - ../ros2_ws/src/atlas:/shared/atlas
      - ../ros2_ws/src/atlas/ros2_examples/src/ros2_aeva_publisher:/ros2_ws/src/ros2_aeva_publisher
      - ../ros2_ws/src/atlas/ros2_examples/src/aeva_msgs:/ros2_ws/src/aeva_msgs
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/atlas-launch.sh

  hugin:
    build:
     context: ..
     dockerfile: docker/hugin/Dockerfile
    container_name: hugin
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    network_mode: host
    # ports:
    #   - "6001:6001/udp"
    #   - "6003:6003/udp"
    #   - "6007:6007/udp"
    #   - "6010:6010/udp"
    volumes:
      - /dev/:/dev/
      - ../ros2_ws/build/hugin-build:/opt/ros/overlay_ws/build
      - ../shared/:/shared/
      - ../ros2_ws/src/hugin/ros2/src/:/opt/ros/overlay_ws/src/
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=$DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/hugin-launch.sh

  bunker:
    build:
      context: .
      dockerfile: bunker/Dockerfile
    container_name: bunker
    privileged: true
    network_mode: host
    volumes:
      - ../ros2_ws/build/bunker-build:/ros2_ws/build
      - ../ros2_ws/src/bunker_description:/ros2_ws/src/bunker_description
      - ../shared/:/shared/
      - ../config/bunker:/config/bunker
    environment:
      - ROS_DOMAIN_ID=30
      #- CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: /shared/bunker-launch.sh

  recorder:
    build:
      context: .
      dockerfile: recorder/Dockerfile
    container_name: recorder
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../../rosbags/:/rosbags/
      - ../ros2_ws/build/recorder-build:/ros2_ws/build
      - ../shared/:/shared/
      - ../ros2_ws/src/atlas:/shared/atlas
      - ../ros2_ws/src/atlas/ros2_examples/src/ros2_aeva_publisher:/ros2_ws/src/ros2_aeva_publisher
      - ../ros2_ws/src/atlas/ros2_examples/src/aeva_msgs:/ros2_ws/src/aeva_msgs
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/recorder-launch.sh

  visualizer:
    build:
      context: .
      dockerfile: visualizer/Dockerfile
    container_name: visualizer
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    # ports:
    #   - "9092:9092"
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../../rosbags/:/rosbags/
      - ../ros2_ws/build/visualizer-build:/ros2_ws/build
      - ../shared/:/shared/
      - ../ros2_ws/src/atlas:/shared/atlas
      - ../ros2_ws/src/atlas/ros2_examples/src/ros2_aeva_publisher:/ros2_ws/src/ros2_aeva_publisher
      - ../ros2_ws/src/atlas/ros2_examples/src/aeva_msgs:/ros2_ws/src/aeva_msgs
      - ../ros2_ws/src/bunker_description:/ros2_ws/src/bunker_description
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=$DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/visualizer-launch.sh

### NAVIGATION PIPELINE ###

  traversability_ros2:
    build:
     context: .
     dockerfile: traversability_mapping/traversability_mapping_ros2.Dockerfile
    container_name: trav_ros2
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws/build/trav_ros2-build:/ros2_ws/build
      - ../shared/:/shared/
      - ../ros2_ws/src/traversability_mapping_ros2:/ros2_ws/src/traversability_mapping_ros2
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/trav_ros2-launch.sh

  glim:
    build:
     context: .
     dockerfile: glim/glim-jetson.Dockerfile
    container_name: glim
    privileged: true
    network_mode: host
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    volumes:
      - /dev/:/dev/
      - ../../rosbags/:/rosbags/
      - ../ros2_ws/build/glim-build:/ros2_ws/build
      - ../shared/:/shared/
      - ../config/glim/config:/glim_ws/src/glim/config
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/glim-launch.sh
  
  nav2:
    build:
      context: .
      dockerfile: nav2/Dockerfile
    container_name: nav2
    network_mode: host
    volumes:
      - ../ros2_ws/build/nav2-build:/ros2_ws/build
      - ../shared/:/shared/
      - ../config/nav2:/nav2
      - ../config/nav2/navigation_launch.py:/opt/ros/kilted/share/nav2_bringup/launch/navigation_launch.py:rw
      - ../config/nav2/bringup_launch.py:/opt/ros/kilted/share/nav2_bringup/launch/bringup_launch.py:rw
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/nav2-launch.sh

