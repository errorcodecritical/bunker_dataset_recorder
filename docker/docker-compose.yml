version: '3.8'

services:
  hesai_driver:
    image: hesai_lidar_noetic:latest
    container_name: hesai_lidar_driver
    build:
      context: ./hesai
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Hesai ROS Workspace ==="
        catkin_make -DCATKIN_WHITELIST_PACKAGES="hesai_lidar" -DCMAKE_BUILD_TYPE=Release
        source /catkin_ws/devel/setup.bash
        roslaunch hesai_lidar hesai_lidar.launch lidar_type:="PandarXT-32" 
        # device_ip:="192.168.1.201"

  oakd_driver:
    image: oakd_noetic:latest
    container_name: oakd_driver
    build:
      context: ./oakd
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building OakD ROS Workspace ==="
        catkin_make -DCATKIN_WHITELIST_PACKAGES="oakd" -DCMAKE_BUILD_TYPE=Release
        source /catkin_ws/devel/setup.bash
        roslaunch depthai_ros_driver camera.launch


  xsens_mti_driver:
