      - ../ros2_ws/src/traversability_mapping_ros2:/root/ros2_ws/src/traversability_mapping_ros2
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///root/shared_folder/cyclonedds-config.xml
