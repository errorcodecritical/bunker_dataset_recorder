      - ../sensor_configs/explo_planner/config:/root/ros2_ws/src/explo_planner/config
      - ../sensor_configs/scovox/scovox_multi_robot.launch.py:/root/ros2_ws/src/scovox/src/scovox_mapping/launch/scovox_multi_robot.launch.py:rw
