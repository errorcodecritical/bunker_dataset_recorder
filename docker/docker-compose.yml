    privileged: true
    network_mode: host
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    volumes:
      - /dev/:/dev/
      - ../../rosbags/:/root/rosbags/
      - ../ros2_ws/build/glim-build:/root/ros2_ws/build
      - ../shared_folder/:/root/shared_folder/
      - ../sensor_configs/glim/config:/glim_ws/src/glim/config
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///root/shared_folder/cyclonedds-config.xml
    command: /root/shared_folder/glim-launch.sh
  
  nav2:
    build:
      context: .
      dockerfile: nav2/nav2.Dockerfile
    container_name: nav2
    network_mode: host
    volumes:
      - ../ros2_ws/build/nav2-build:/root/ros2_ws/build
      - ../shared_folder/:/root/shared_folder/
      - ../sensor_configs/nav2:/root/nav2
      - ../sensor_configs/nav2/navigation_launch.py:/opt/ros/kilted/share/nav2_bringup/launch/navigation_launch.py:rw
      - ../sensor_configs/nav2/bringup_launch.py:/opt/ros/kilted/share/nav2_bringup/launch/bringup_launch.py:rw
    environment:
      - ROS_DOMAIN_ID=30
      - CYCLONEDDS_URI=file:///root/shared_folder/cyclonedds-config.xml
    command: /root/shared_folder/nav2-launch.sh

