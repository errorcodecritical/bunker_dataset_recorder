version: '3.8'

services:
  hesai_driver:
    image: hesai_lidar_noetic:latest
    container_name: hesai_lidar_driver
    build:
      context: ./hesai
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - ../catkin_ws:/catkin_ws
      - ../config/hesai/config.yaml:/catkin_ws/src/HesaiLidar_ROS_2.0/config/config.yaml
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Hesai ROS Workspace ==="
        catkin build hesai_ros_driver -j 6 -p 6
        source /catkin_ws/devel/setup.bash
        roslaunch hesai_ros_driver start.launch

  oakd_driver:
    image: oakd_noetic:latest
    container_name: oakd_driver
    build:
      context: ./oakd
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
      - ../config/oakd/depthai_ros_driver/config:/catkin_ws/src/depthai-ros/depthai_ros_driver/config
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building OakD ROS Workspace ==="
        catkin build depthai_ros_driver -j 6 -p 6
        source /catkin_ws/devel/setup.bash
        roslaunch depthai_ros_driver camera.launch

  xsens_mti_driver:
    image: xsens_mti_noetic:latest
    container_name: xsens_mti_driver
    build:
      context: ./xsens
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Xsens MTI ROS Workspace ==="
        source /catkin_ws/devel/setup.bash
        roslaunch xsens_mti_driver xsens_mti_node.launch

  nmea_navsat_driver:
    image: nmea_navsat_noetic:latest
    container_name: nmea_navsat_driver
    build:
      context: ./emlid
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building NMEA NavSat ROS Workspace ==="
        source /catkin_ws/devel/setup.bash
        roslaunch nmea_navsat_driver nmea_serial_driver.launch

  recorder:
    image: ros_noetic_recorder:latest
    container_name: recorder
    build:
      context: ./recorder
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.Xauthority
    volumes:
      - ../catkin_ws:/catkin_ws
      - ../rosbags:/rosbags
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/tmp/.Xauthority:rw
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Recorder ROS Workspace ==="
        source /catkin_ws/devel/setup.bash
        roscore &
        sleep 1
        rosbag record -O /rosbags/$(date +%Y_%m_%d_%H_%M_%S)_recording.bag \
          /hesai/points \
          /oak/rgb/image_raw \
          /oak/stereo/image_raw \
          /oak/imu/data \
          /imu/data \
          /imu/mag \
          /fix \
          /odom \
          /cmd_vel

  bunker_driver:
    image: bunker_driver_noetic:latest
    container_name: bunker_driver
    build:
      context: ./bunker
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
      - ../config/bunker/bunker_robot_base.launch:/catkin_ws/src/bunker_ros/bunker_bringup/launch/bunker_robot_base.launch
      - ../config:/config
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Activating CAN2 device ==="
        ip link set can2 up type can bitrate 500000
        echo "=== Building Bunker ROS Workspace ==="
        catkin build bunker_base bunker_msgs bunker_bringup ugv_sdk -j 6 -p 6 --cmake-args -DCMAKE_CXX_FLAGS="-DASIO_ENABLE_OLD_SERVICES"
        source /catkin_ws/devel/setup.bash
        roslaunch twist_mux twist_mux.launch config_locks:=/config/bunker/twist_mux.yaml config_topics:=/config/bunker/twist_mux.yaml &
        sleep 1
        roslaunch bunker_bringup bunker_robot_base.launch

  teleop:
    build:
      context: ./bunker
      dockerfile: Dockerfile
    init: true
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - /dev/:/dev/
      - ../catkin_ws:/catkin_ws
    command:
      - /bin/bash
      - -c
      - |
        sleep 3
        echo "=== Building Teleop ROS Workspace ==="
        source /catkin_ws/devel/setup.bash
        roslaunch bunker_bringup bunker_teleop_keyboard.launch
    depends_on:
      - bunker_driver