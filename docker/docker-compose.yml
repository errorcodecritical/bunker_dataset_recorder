services:
  xsens:
    build:
     context: ..
     dockerfile: docker/xsens/Dockerfile
    image: ros2_xsens_driver:latest
    container_name: xsens
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../config/xsens/mtdevice.py:/ros2_ws/src/norlab_xsens_driver/xsens_driver/mtdevice.py:rw
      - ../config/xsens/mtnode.py:/ros2_ws/src/norlab_xsens_driver/xsens_driver/mtnode.py:rw
      - ../config/xsens/xsens_driver.launch.xml:/ros2_ws/src/norlab_xsens_driver/launch/xsens_driver.launch.xml:rw
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command:
      - bash
      - -c
      - |
        echo "=== Starting XSENS driver ==="
        colcon build --symlink-install --packages-select norlab_xsens_driver --cmake-args -DCMAKE_BUILD_TYPE=Release
        source /ros2_ws/install/setup.bash
        ros2 launch xsens_driver xsens_driver.launch.xml

  emlid:
    build:
      context: ..
      dockerfile: docker/emlid/Dockerfile
    image: ros2_emlid_driver:latest
    container_name: emlid
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../config/emlid/nmea_serial_driver.py:/ros2_ws/src/nmea_navsat_driver/src/libnmea_navsat_driver/nodes/nmea_serial_driver.py:rw
      - ../config/emlid/nmea_serial_driver.yaml:/ros2_ws/src/nmea_navsat_driver/config/nmea_serial_driver.yaml:rw
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command:
      - bash
      - -c
      - |
        echo "=== Starting EMLID driver ==="
        source /ros2_ws/install/setup.bash
        ros2 launch nmea_navsat_driver nmea_serial_driver.launch.xml

  oakd:
    build:
      context: ..
      dockerfile: docker/oakd/Dockerfile
    image: ros2_oakd_driver:latest
    container_name: oakd
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      #Depthai ROS config
      - ../config/oakd/depthai_ros_driver/config:/opt/ros/jazzy/share/depthai_ros_driver/config
      - ../config/oakd/depthai_ros_driver/launch:/opt/ros/jazzy/share/depthai_ros_driver/launch
      #Depthai ROS V3 config
      #- ../config/oakd/depthai_ros_driver/config/:/opt/ros/jazzy/share/depthai_ros_driver_v3/config/
      #- ../config/oakd/depthai_ros_driver/launch/:/opt/ros/jazzy/share/depthai_ros_driver_v3/launch/
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command:
      - bash
      - -c
      - |
        echo "=== Starting OAK-D driver ==="
        source /ros2_ws/install/setup.bash
        ros2 launch depthai_ros_driver camera.launch.py

  hesai:
    build:
     context: ..
     dockerfile: docker/hesai/Dockerfile
    image: ros2_hesai_driver:latest
    container_name: hesai
    privileged: true
    network_mode: host
    # ports:
    #   - "2368:2368/udp"
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command:
      - bash
      - -c
      - |
        echo "=== Starting HESAI driver ==="
        colcon build --symlink-install --packages-select hesai_ros_driver --cmake-args -DCMAKE_BUILD_TYPE=Release
        source /ros2_ws/install/setup.bash
        ros2 run hesai_ros_driver hesai_ros_driver_node

  atlas:
    build:
     context: ..
     dockerfile: docker/atlas/Dockerfile
    image: ros2_atlas_driver:latest
    container_name: atlas
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command:
      - bash
      - -c
      - |
        echo "=== Starting ATLAS driver ==="
        colcon build --symlink-install --packages-select ros2_aeva_publisher --cmake-args -DCMAKE_BUILD_TYPE=Release
        source /ros2_ws/install/setup.bash
        ros2 run ros2_aeva_publisher ros2_aeva_publisher 10.1.14.24 ATLAS

  hugin:
    build:
     context: ..
     dockerfile: docker/hugin/Dockerfile
    image: ros2_hugin_driver:latest
    container_name: hugin
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    network_mode: host
    # ports:
    #   - "6001:6001/udp"
    #   - "6003:6003/udp"
    #   - "6007:6007/udp"
    #   - "6010:6010/udp"
    volumes:
      - /dev/:/dev/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../shared/hugin/ros2/src/:/opt/ros/overlay_ws/src/
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=$DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command:
      - bash
      - -c
      - |
        echo "=== Starting HUGIN driver ==="
        colcon build --symlink-install --packages-select hugin_ros2_driver --cmake-args -DCMAKE_BUILD_TYPE=Release
        source /ros2_ws/install/setup.bash
        ros2 launch hugin_ros2_driver hugin_ros2_driver.launch.py

  bunker:
    build:
      context: ..
      dockerfile: docker/bunker/Dockerfile
    image: ros2_bunker_driver:latest
    container_name: bunker
    privileged: true
    network_mode: host
    volumes:
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../config/bunker:/config/bunker
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      #- CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command:
      - bash
      - -c
      - |
        echo "=== Starting BUNKER driver ==="
        colcon build --symlink-install --packages-select bunker_ros2_driver --cmake-args -DCMAKE_BUILD_TYPE=Release
        source /ros2_ws/install/setup.bash
        ros2 launch bunker_base bunker_base.launch.py use_sim_time:=false port_name:=can2 odom_frame:=odom base_frame:=base_link odom_topic_name:=bunker_odom is_bunker_mini:=true simulated_robot:=false control_rate:=50 &
        ros2 launch bunker_description robot_state_publisher.launch.py
#ros2 launch /root/shared/teleop_bringup.launch.py

  recorder:
    build:
      context: ..
      dockerfile: docker/recorder/Dockerfile
    image: ros2_recorder:latest
    container_name: recorder
    privileged: true
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../../rosbags/:/rosbags/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../ros2_ws/src/atlas:/shared/atlas # !
      - ../ros2_ws/src/atlas/ros2_examples/src/ros2_aeva_publisher:/ros2_ws/src/ros2_aeva_publisher
      - ../ros2_ws/src/atlas/ros2_examples/src/aeva_msgs:/ros2_ws/src/aeva_msgs
    environment:
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/recorder-launch.sh

  visualizer:
    build:
      context: ..
      dockerfile: docker/visualizer/Dockerfile
    image: ros2_visualizer:latest
    container_name: visualizer
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    # ports:
    #   - "9092:9092"
    network_mode: host
    volumes:
      - /dev/:/dev/
      - ../../rosbags/:/rosbags/
      - ../ros2_ws:/ros2_ws
      - ../shared/:/shared/
      - ../ros2_ws/src/atlas:/shared/atlas # !
      - ../ros2_ws/src/atlas/ros2_examples/src/ros2_aeva_publisher:/ros2_ws/src/ros2_aeva_publisher
      - ../ros2_ws/src/atlas/ros2_examples/src/aeva_msgs:/ros2_ws/src/aeva_msgs
      - ../ros2_ws/src/bunker_description:/ros2_ws/src/bunker_description
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=$DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=30
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///shared/cyclonedds-config.xml
    command: /shared/visualizer-launch.sh
