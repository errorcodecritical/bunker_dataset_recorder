      - ../config/explo_planner/config:/ros2_ws/src/explo_planner/config
      - ../config/scovox/scovox_multi_robot.launch.py:/ros2_ws/src/scovox/src/scovox_mapping/launch/scovox_multi_robot.launch.py:rw
