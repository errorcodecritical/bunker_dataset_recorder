# Teleop configuration for 8BITDO Gamepad using the x-pad configuration.
# Left thumb-stick up/down for velocity, left/right for twist
# LB for enable
# RB for enable-turbo

# Configured to match RC controller
/teleop_twist_joy_node:
  ros__parameters:
    axis_linear:
      x: 1
    scale_linear:
      x: 0.4
    scale_linear_turbo:
      x: 3.8
    axis_angular:
      yaw: 2
    scale_angular:
      yaw: 1.2
    scale_angular_turbo:
      yaw: 3.6
    enable_button: 6
    enable_turbo_button: 7
/joy_node:
  ros__parameters:
    deadzone: 0.1
    autorepeat_rate: 20.0
    dev: /dev/input/js0