# Configuration file for Ymir multi-radar odometry aggregator

/**:
  ros__parameters:
    # Frame IDs
    odom_frame_id: "odom"
    baselink_frame_id: "base_link"

    # Topic discovery period in seconds
    # Ymir will periodically scan for new ego_motion topics at this interval
    # Useful when radars may not be publishing data at startup
    discovery_period: 1.0

    # Low-pass filter coefficient for multi-radar fusion (0 < alpha <= 1.0)
    # Higher values = more responsive to new measurements, lower values = smoother
    # Only used when multiple radars are present (single radar uses direct output)
    # Typical values: 0.1 - 0.5
    # - 0.1: Very smooth, slow response
    # - 0.5: More responsive, less filtering
    alpha: 0.3

    # Ego trajectory path settings
    # Maximum number of poses to keep in published path (0 = unlimited, not recommended)
    # At 5 Hz: 150 = 30s, 300 = 60s, 600 = 120s of history
    max_path_length: 600

    # Path publish rate in Hz (reduces bandwidth vs publishing on every update)
    path_publish_rate: 5.0

    # Historical trajectory marker settings:
    # Publish individual arrow markers for full session history
    # Distance threshold: minimum distance (meters) traveled before publishing next
    # marker
    # Set to 0 to disable markers
    # Example: 1.0 = publish marker every 1 meter traveled
    marker_distance_threshold: 1.0

    # Arrow marker width (shaft thickness)
    marker_arrow_width: 0.3
